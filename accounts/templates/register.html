{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Register Form</title>
    <link rel="stylesheet" href="{% static 'accounts/register.css' %}">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h2>Sign Up</h2>
                <p>Enter your credentials to register</p>
            </div>
            
            <form class="register-form" id="registerForm" novalidate>
                <div class="form-group">
                    <span class="error-message" id="formError"></span>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="email" name="email" required autocomplete="email">
                        <label for="email">Email</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required autocomplete="username">
                        <label for="username">Username</label>
                    </div>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required >
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="confirmpassword" name="confirmpassword" required>
                        <label for="confirmpassword">Confirm Password</label>
                    </div>
                    <span class="error-message" id="confirmpasswordError"></span>
                </div>

                <button type="submit" class="register-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Already have an account? <a href="/accounts/login">Log In</a></p>
            </div>
        </div>
    </div>

    <script src="{% static 'accounts/register.js' %}"></script>
</body>
</html>
